name: Documentation

on:
  pull_request:
    paths:
      - "docs/**"
      - "apps/web/content/docs/**"
      - "scripts/check-docs.mjs"
      - "scripts/check-workspaces.mjs"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs:check
