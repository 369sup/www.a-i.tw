[[actions]]
name = "Kill Port 3000"
icon = "debug"
command = '''
pids=$(netstat -ano 2>/dev/null | grep ":3000 " | awk '{print $5}' | sort -u)
if [ -z "$pids" ]; then
    echo "No process found on port 3000"
else
    for pid in $pids; do
        taskkill //F //PID "$pid" 2>/dev/null && echo "Killed PID $pid" || true
    done
fi'''
platform = "win32"

