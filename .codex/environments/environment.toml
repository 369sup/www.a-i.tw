[[actions]]
name = "Git Commit"
icon = "run"
command = '''
read -r -p "Commit message: " message

if [ -z "${message//[[:space:]]/}" ]; then
    echo "Commit message cannot be empty." >&2
    exit 1
fi

git commit -m "$message"'''
platform = "win32"

[[actions]]
name = "Git Push Current Branch"
icon = "run"
command = '''
set -e

branch=$(git branch --show-current)

if [ -z "$branch" ]; then
    echo "Currently in detached HEAD state, cannot push a regular branch." >&2
    exit 1
fi

git push --set-upstream origin "$branch"'''
platform = "win32"

[[actions]]
name = "Git Safe Sync"
icon = "run"
command = '''
