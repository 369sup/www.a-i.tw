# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "www.a-i.tw"

[setup]
script = ""

[[actions]]
name = "Git 狀態"
icon = "tool"
command = "git status --short --branch"
platform = "win32"

[[actions]]
name = "Git 完整資訊"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Write-Host "=== Repository ==="
git rev-parse --show-toplevel

Write-Host "`n=== Branch ==="
git branch --show-current

Write-Host "`n=== Remote ==="
git remote --verbose

Write-Host "`n=== Status ==="
git status --short --branch

Write-Host "`n=== Recent Commits ==="
git log --graph --decorate --oneline --all -15'''
platform = "win32"

[[actions]]
name = "Git 分支"
icon = "tool"
command = "git branch --all --verbose --no-abbrev"
platform = "win32"

[[actions]]
name = "Git 歷史"
icon = "tool"
command = "git log --graph --decorate --oneline --all -30"
platform = "win32"

[[actions]]
name = "Git 遠端"
icon = "tool"
command = "git remote --verbose"
platform = "win32"

[[actions]]
name = "Git Fetch"
icon = "tool"
command = "git fetch --all --prune"
platform = "win32"

[[actions]]
name = "Git Clean 預覽"
icon = "tool"
command = "git clean -nd"
platform = "win32"

[[actions]]
name = "安裝相依套件"
icon = "tool"
command = "pnpm install"
platform = "win32"

[[actions]]
name = "環境版本"
icon = "tool"
command = '''
Write-Host "Node:"
node --version

Write-Host "`npnpm:"
pnpm --version

Write-Host "`nGit:"
git --version

Write-Host "`nPowerShell:"
$PSVersionTable.PSVersion'''
platform = "win32"

[[actions]]
