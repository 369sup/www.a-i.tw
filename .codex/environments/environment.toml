[[actions]]
name = "Git 衝突檢查"
icon = "debug"
command = '''
$conflicts = git diff --name-only --diff-filter=U

if ([string]::IsNullOrWhiteSpace(($conflicts -join ""))) {
    Write-Host "未發現 Git 合併衝突。"
}
else {
    Write-Host "發現以下衝突檔案："
    $conflicts
    exit 1
}'''
platform = "win32"

[[actions]]
