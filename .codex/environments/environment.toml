[[actions]]
name = "建置專案"
icon = "tool"
command = "pnpm build"
platform = "win32"

[[actions]]
name = "啟動正式環境"
icon = "run"
command = "pnpm start"
platform = "win32"

[[actions]]
name = "Git Pull"
icon = "run"
command = "git pull --ff-only"
platform = "win32"

[[actions]]
name = "Git Push"
icon = "run"
command = "git push"
platform = "win32"

[[actions]]
name = "Git 推送目前分支"
icon = "run"
command = '''
$ErrorActionPreference = "Stop"

$branch = git branch --show-current

if ([string]::IsNullOrWhiteSpace($branch)) {
    throw "目前處於 detached HEAD，無法推送一般分支。"
}

git push --set-upstream origin $branch'''
platform = "win32"

[[actions]]
name = "Git 安全同步"
icon = "run"
command = '''
$ErrorActionPreference = "Stop"

git fetch --all --prune
git pull --ff-only
git push'''
platform = "win32"

[[actions]]
name = "Git Stage All"
icon = "run"
command = '''
git add --all
git status --short'''
platform = "win32"

[[actions]]
name = "Git Unstage All"
icon = "run"
command = '''
git restore --staged .
git status --short'''
platform = "win32"

[[actions]]
name = "Turbo 建置"
icon = "run"
command = "pnpm exec turbo run build"
platform = "win32"

[[actions]]
name = "Turbo 開發"
icon = "run"
command = "pnpm exec turbo run dev"
platform = "win32"

[[actions]]
name = "Git 工作區差異"
icon = "debug"
command = "git diff"
platform = "win32"

[[actions]]
