# Project-local Codex configuration.
# Credentials, connector IDs, OAuth state, and user plugin cache remain host-managed.

[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server"]

[agents.serena_semantic_reviewer]
config = "./agents/serena-semantic-reviewer.toml"

[project]
root = "."

[tool_policy]
serena = "all-available"
context7 = "autonomous-when-version-sensitive"
