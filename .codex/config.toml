#:schema https://developers.openai.com/codex/config-schema.json

# Project-local Codex configuration. Personal model, UI, notification,
# authentication, profile, marketplace state, and host-owned runtime settings
# remain in the user-level configuration.

project_doc_max_bytes = 65536

[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 1
interrupt_message = true

[agents.architect]
description = "Analyze repository architecture and ownership boundaries."
config_file = "./agents/architect.toml"

[agents.documenter]
description = "Maintain canonical repository documentation."
config_file = "./agents/documenter.toml"

[agents.implementer]
description = "Implement the smallest confirmed repository change."
config_file = "./agents/implementer.toml"

[agents.product-researcher]
description = "Research official product behavior and semantic ownership."
config_file = "./agents/product-researcher.toml"

[agents.reviewer]
description = "Review correctness, regressions, security, and test gaps."
config_file = "./agents/reviewer.toml"

[agents.security-reviewer]
description = "Review attack paths, authorization, data exposure, and supply-chain risks."
config_file = "./agents/security-reviewer.toml"

[agents.test-engineer]
description = "Build focused tests for approved behavior."
config_file = "./agents/test-engineer.toml"

[agents.verifier]
description = "Independently execute and classify repository validation."
config_file = "./agents/verifier.toml"
