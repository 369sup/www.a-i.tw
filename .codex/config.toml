# Project-local Codex configuration.
# Credentials, connector IDs, OAuth state, and user plugin cache remain host-managed.

[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--project-from-cwd", "--open-web-dashboard", "false"]

[project]
root = "."

[tool_policy]
serena = "autonomous-all-relevant-tools"
context7 = "autonomous-version-sensitive-only"
