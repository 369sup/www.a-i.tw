rules:
  - id: domain-must-not-import-frameworks
    languages: [typescript]
    message: Domain code must remain framework-agnostic; use an application port or adapter.
    severity: ERROR
    pattern-regex: "(?:from|import)[^\\n]*[\\\"'](?:next|react|@/app|@/components)(?:/|[\\\"'])"
    paths:
      include:
        - "/modules/**/src/domain/**"
        - "/apps/web/src/modules/**/src/domain/**"
