rules:
  - id: domain-must-not-import-frameworks
    languages: [typescript]
    message: Domain code must remain framework-agnostic; use an application port or adapter.
    severity: ERROR
    pattern-regex: "(?:from|import)[^\\n]*[\\\"'](?:next|react|@/app|@/components)(?:/|[\\\"'])"
    paths:
      include:
        - "/apps/web/src/modules/**/src/domain/**"
        - "/apps/web/src/modules/**/src/subdomains/**/domain/**"
        - "/apps/web/src/modules/**/domain/**"
  - id: context-shared-directory-requires-governance
    languages: [generic]
    message: Ownership-free shared/common/core/utils/helpers directories are forbidden inside product Context layers.
    severity: ERROR
    pattern-regex: ".*"
    paths:
      include:
        - "/apps/web/src/modules/**/domain/{shared,common,core,utils,helpers}/**"
        - "/apps/web/src/modules/**/application/{shared,common,core,utils,helpers}/**"
        - "/apps/web/src/modules/**/contracts/{shared,common,core,utils,helpers}/**"
        - "/apps/web/src/modules/**/infrastructure/{shared,common,core,utils,helpers}/**"
        - "/apps/web/src/modules/**/presentation/{shared,common,core,utils,helpers}/**"
  - id: context-core-must-not-import-peer-context
    languages: [typescript]
    message: Domain and Contracts cannot know another Context; use a consumer Application Port and outbound integration ACL.
    severity: ERROR
    pattern-regex: "(?:from|import)[^\\n]*[\\\"']@/src/modules/"
    paths:
      include:
        - "/apps/web/src/modules/**/domain/**"
        - "/apps/web/src/modules/**/contracts/**"
  - id: context-outbound-peer-import-requires-integration
    languages: [typescript]
    message: Cross-context imports in outbound adapters belong under integrations and may target only Published Language.
    severity: ERROR
    pattern-regex: "(?:from|import)[^\\n]*[\\\"']@/src/modules/"
    paths:
      include:
        - "/apps/web/src/modules/**/adapters/outbound/**"
      exclude:
        - "/apps/web/src/modules/**/adapters/outbound/integrations/**"
